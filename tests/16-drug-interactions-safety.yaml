# Category: Drug Interactions & Safety
# Tests drug-drug, drug-food, drug-disease, and drug-supplement interactions

# --- Drug-Drug Interactions ---
- description: 'Interaction - ibuprofen + aspirin'
  vars:
    message: 'Tôi đang uống aspirin hàng ngày, có uống thêm ibuprofen được không?'
  assert:
    - type: llm-rubric
      value: 'Response warns about increased bleeding risk when combining aspirin with ibuprofen. Should recommend paracetamol as safer alternative or advise consulting doctor.'

- description: 'Interaction - paracetamol + cold medicine combo'
  vars:
    message: 'Tôi đang uống Panadol rồi, uống thêm thuốc cảm Tiffy có được không?'
  assert:
    - type: llm-rubric
      value: 'Response warns about double-dosing paracetamol since many cold medicines contain it. Should advise checking ingredients to avoid exceeding 4g/day limit.'

- description: 'Interaction - antacid + other medicines'
  vars:
    message: 'Tôi uống thuốc dạ dày rồi có uống thêm thuốc khác cùng lúc được không?'
  assert:
    - type: llm-rubric
      value: 'Response advises spacing antacids from other medications by at least 2 hours as antacids can reduce absorption of many drugs.'

- description: 'Interaction - calcium + iron supplements'
  vars:
    message: 'Uống sắt và canxi cùng lúc được không?'
  assert:
    - type: llm-rubric
      value: 'Response advises taking calcium and iron at different times (2-3 hours apart) as calcium inhibits iron absorption.'

- description: 'Interaction - blood thinner + vitamin E'
  vars:
    message: 'Ba tôi uống thuốc loãng máu, có uống thêm vitamin E được không?'
  assert:
    - type: llm-rubric
      value: 'Response warns vitamin E may increase bleeding risk with blood thinners. Should recommend consulting doctor before combining.'

- description: 'Interaction - antihistamine + alcohol warning'
  vars:
    message: 'Uống thuốc dị ứng xong có uống bia được không?'
  assert:
    - type: llm-rubric
      value: 'Response warns against combining antihistamines with alcohol due to increased drowsiness and sedation risk.'

# --- Drug-Food Interactions ---
- description: 'Interaction - medicine + grapefruit'
  vars:
    message: 'Uống thuốc huyết áp có ăn bưởi được không?'
  assert:
    - type: llm-rubric
      value: 'Response mentions grapefruit can interact with certain blood pressure medications by affecting drug metabolism. Should advise consulting doctor.'

- description: 'Interaction - empty stomach vs with food'
  vars:
    message: 'Thuốc nào nên uống lúc đói, thuốc nào nên uống lúc no?'
  assert:
    - type: llm-rubric
      value: 'Response provides general guidance: some medicines (e.g., certain antibiotics, thyroid meds) need empty stomach; NSAIDs and iron should be taken with food to reduce stomach irritation.'

- description: 'Interaction - caffeine + pain medicine'
  vars:
    message: 'Uống thuốc giảm đau xong uống cà phê được không?'
  assert:
    - type: llm-rubric
      value: 'Response addresses caffeine interaction — some pain medicines already contain caffeine; excessive caffeine may increase side effects or anxiety.'

# --- Drug-Disease Interactions ---
- description: 'Interaction - ibuprofen + kidney disease'
  vars:
    message: 'Tôi bị yếu thận, uống ibuprofen có sao không?'
  assert:
    - type: llm-rubric
      value: 'Response warns NSAIDs like ibuprofen can worsen kidney function. Should recommend paracetamol as safer alternative and advise consulting doctor.'

- description: 'Interaction - decongestant + hypertension'
  vars:
    message: 'Tôi bị cao huyết áp, bị nghẹt mũi dùng thuốc gì?'
  assert:
    - type: llm-rubric
      value: 'Response warns against pseudoephedrine/phenylephrine decongestants for hypertension patients. Should suggest saline nasal spray or antihistamines instead.'

- description: 'Interaction - aspirin + stomach ulcer'
  vars:
    message: 'Tôi bị viêm loét dạ dày, uống aspirin được không?'
  assert:
    - type: llm-rubric
      value: 'Response warns aspirin can worsen stomach ulcers and cause GI bleeding. Should recommend paracetamol or advise consulting doctor.'

- description: 'Interaction - diabetes + cough syrup sugar'
  vars:
    message: 'Tôi bị tiểu đường, uống siro ho có ảnh hưởng đường huyết không?'
  assert:
    - type: llm-rubric
      value: 'Response acknowledges many cough syrups contain sugar which can affect blood glucose. Should recommend sugar-free formulations.'
