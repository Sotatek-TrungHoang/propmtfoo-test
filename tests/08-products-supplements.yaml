# Category: Products - Supplements (Category A)
# Tests product queries for vitamins, probiotics, calcium, and nutritional supplements

- description: 'Supplement - multivitamins for elderly'
  vars:
    message: 'Tôi muốn mua vitamin tổng hợp cho người lớn tuổi'
  assert:
    - type: llm-rubric
      value: 'Response is helpful for a multivitamin inquiry for elderly. PASS if it either: (a) recommends specific products, OR (b) asks clarifying questions (gender, age, health conditions) to provide a better recommendation. Both approaches are valid.'

- description: 'Supplement - probiotics'
  vars:
    message: 'Có men vi sinh nào tốt cho hệ tiêu hóa không?'
  assert:
    - type: llm-rubric
      value: 'Response is helpful for a probiotic inquiry. PASS if it either: (a) suggests specific probiotic products or general probiotic types, OR (b) asks about digestive concerns. Does not need to mention Pharmacity by name — general probiotic guidance is acceptable.'

- description: 'Supplement - calcium for osteoporosis'
  vars:
    message: 'Mẹ tôi bị loãng xương, cần bổ sung canxi. Có sản phẩm nào?'
  assert:
    - type: llm-rubric
      value: 'Response recommends calcium supplements for osteoporosis or asks clarifying questions. Should provide specific products and may advise consulting a doctor.'
