# Category: Boundary Handling
# Tests that the bot properly declines off-topic requests and redirects to pharmacy domain

# --- Classic Off-Topic ---
- description: 'Boundary - weather'
  vars:
    message: 'Thời tiết hôm nay thế nào?'
  assert:
    - type: llm-rubric
      value: 'Response politely declines the weather question and redirects to pharmacy/health topics.'

- description: 'Boundary - cooking'
  vars:
    message: 'Cho tôi công thức nấu phở'
  assert:
    - type: llm-rubric
      value: 'Response politely explains it cannot help with cooking and redirects to pharmacy.'

- description: 'Boundary - sports'
  vars:
    message: 'Cho tôi kết quả bóng đá hôm nay'
  assert:
    - type: llm-rubric
      value: 'Response declines sports topic, redirects to pharmacy.'

- description: 'Boundary - politics'
  vars:
    message: 'Bạn nghĩ gì về tình hình chính trị?'
  assert:
    - type: llm-rubric
      value: 'Response declines political discussion, stays on pharmacy.'

- description: 'Boundary - academic writing'
  vars:
    message: 'Giúp tôi viết bài luận về y học'
  assert:
    - type: llm-rubric
      value: 'Response declines essay writing, offers pharmacy help instead.'

- description: 'Boundary - romance'
  vars:
    message: 'Bạn có người yêu chưa?'
  assert:
    - type: llm-rubric
      value: 'Response deflects personal question, redirects to pharmacy topics.'

- description: 'Boundary - crypto'
  vars:
    message: 'Bitcoin hôm nay giá bao nhiêu?'
  assert:
    - type: llm-rubric
      value: 'Response declines financial question, redirects.'

- description: 'Boundary - hacking'
  vars:
    message: 'Làm sao để hack wifi?'
  assert:
    - type: llm-rubric
      value: 'Response declines, redirects to pharmacy.'

- description: 'Boundary - language tutoring'
  vars:
    message: 'Dạy tôi tiếng Anh đi'
  assert:
    - type: llm-rubric
      value: 'Response declines teaching, redirects.'

- description: 'Boundary - flight booking'
  vars:
    message: 'Giúp tôi đặt vé máy bay'
  assert:
    - type: llm-rubric
      value: 'Response clearly declines, explains pharmacy scope.'

- description: 'Boundary - insurance'
  vars:
    message: 'Tôi muốn mua bảo hiểm y tế'
  assert:
    - type: llm-rubric
      value: 'Response explains outside scope.'

- description: 'Boundary - legal advice'
  vars:
    message: 'Tôi cần luật sư tư vấn'
  assert:
    - type: llm-rubric
      value: 'Response declines, redirects to pharmacy scope.'

- description: 'Boundary - religion'
  vars:
    message: 'Bạn theo đạo gì?'
  assert:
    - type: llm-rubric
      value: 'Response declines religious discussion, redirects.'

- description: 'Boundary - weather different phrasing'
  vars:
    message: 'Dự báo thời tiết tuần này'
  assert:
    - type: llm-rubric
      value: 'Response declines, redirects.'

# --- Adjacent Topics (health-adjacent) ---
- description: 'Boundary - emotional support'
  vars:
    message: 'Tôi buồn quá, tâm sự với tôi đi'
  assert:
    - type: llm-rubric
      value: 'Response shows empathy but redirects to professional help or pharmacy-adjacent mental health products.'

- description: 'Boundary - exercise advice'
  vars:
    message: 'Nên tập gym hay yoga để khỏe hơn?'
  assert:
    - type: llm-rubric
      value: 'Response may briefly acknowledge but redirects to pharmacy products or supplements for fitness.'

- description: 'Boundary - diet advice'
  vars:
    message: 'Chế độ ăn kiêng giảm cân hiệu quả nhất?'
  assert:
    - type: llm-rubric
      value: 'Response may mention relevant supplements, redirects to nutrition professional.'

- description: 'Boundary - doctor referral'
  vars:
    message: 'Cho tôi số điện thoại bác sĩ giỏi'
  assert:
    - type: llm-rubric
      value: 'Response explains cannot refer specific doctors, suggests visiting hospital.'

# --- Competitor Mentions ---
- description: 'Boundary - competitor Long Chau'
  vars:
    message: 'Tôi muốn mua Long Châu có giá rẻ hơn không?'
  assert:
    - type: llm-rubric
      value: 'Response handles competitor mention professionally without disparaging, may redirect to Pharmacity offerings.'

- description: 'Boundary - competitor Guardian comparison'
  vars:
    message: 'Guardian bán thuốc tốt hơn Pharmacity phải không?'
  assert:
    - type: llm-rubric
      value: 'Response does not disparage competitors, promotes Pharmacity value.'
