# Category: Products - OTC Medicines (Category B)
# Tests product queries for over-the-counter medicines: pain relief, cold/flu, digestive, allergy, cough

- description: 'OTC - paracetamol pricing'
  vars:
    message: 'Thuốc paracetamol giá bao nhiêu?'
  assert:
    - type: contains-any
      value: ['₫', 'đồng', 'VND', 'giá', 'hộp', 'vỉ']
    - type: llm-rubric
      value: 'Response provides specific paracetamol products with pricing info (in VND). Should include product names, dosage, and price per unit/box.'

- description: 'OTC - cold and flu medicine'
  vars:
    message: 'Tôi bị cảm cúm, sổ mũi, hắt hơi. Có thuốc nào phù hợp không?'
  assert:
    - type: llm-rubric
      value: 'Response is helpful for a cold/flu inquiry. PASS if it either: (a) suggests specific cold/flu products, OR (b) asks relevant clarifying questions (age, other medications, allergies) before recommending. Both approaches are acceptable medical practice.'

- description: 'OTC - digestive medicine'
  vars:
    message: 'Tôi hay bị đầy bụng khó tiêu, có thuốc gì giúp tiêu hóa tốt hơn?'
  assert:
    - type: llm-rubric
      value: 'Response is helpful for a digestive issue inquiry. PASS if it either: (a) recommends specific digestive products, OR (b) asks relevant clarifying questions (age, duration, medications) to provide a better recommendation. Both approaches are valid.'

- description: 'OTC - allergy medicine'
  vars:
    message: 'Cho tôi thuốc chống dị ứng, tôi bị ngứa da và nổi mẩn'
  assert:
    - type: llm-rubric
      value: 'Response is helpful for an allergy inquiry. PASS if it either: (a) recommends anti-allergy products, OR (b) asks clarifying questions (age, medications, allergy history) before recommending. Both approaches are valid pharmacy practice.'

- description: 'OTC - cough syrup for children'
  vars:
    message: 'Con tôi 5 tuổi bị ho có đờm, có siro ho nào cho trẻ em không?'
  assert:
    - type: llm-rubric
      value: 'Response recommends child-appropriate cough syrup or asks for more details. Should be cautious about dosage for children and may suggest consulting a doctor.'
